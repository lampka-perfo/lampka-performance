<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lampka Performance — Włączam światło tam, gdzie marketing działa po omacku</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="site.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="../../assets/lampka-logo.js"></script>
<script src="image-slot.js"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="ServicesGrid.jsx"></script>
<script type="text/babel" src="Pains.jsx"></script>
<script type="text/babel" src="Compare.jsx"></script>
<script type="text/babel" src="ConsultantValue.jsx"></script>
<script type="text/babel" src="Process.jsx"></script>
<script type="text/babel" src="SuccessSpotlight.jsx"></script>
<script type="text/babel" src="FAQ.jsx"></script>
<script type="text/babel" src="ContactCTA.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
  const HERO_VARIANT = /*EDITMODE-BEGIN*/{
    "heroVariant": "light-switch"
  }/*EDITMODE-END*/;

  function App() {
    return (
      <>
        <Header />
        <Hero variant={HERO_VARIANT.heroVariant} />
        <ServicesGrid />
        <Pains />
        <Compare />
        <ConsultantValue />
        <Process />
        <SuccessSpotlight />
        <FAQ />
        <ContactCTA />
        <Footer />
      </>
    );
  }

  const DEPS = ['Header','Hero','ServicesGrid','Pains','Compare','ConsultantValue','Process','SuccessSpotlight','FAQ','ContactCTA','Footer'];

  function whenReady(deps, cb) {
    const ok = deps.every(k => typeof window[k] === 'function');
    if (ok) cb();
    else setTimeout(() => whenReady(deps, cb), 30);
  }
  whenReady(DEPS, () => {
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    setTimeout(() => window.LampkaLogo && window.LampkaLogo.injectAll(), 50);
  });

  // Re-run injector when React re-renders (e.g. form submit)
  const obs = new MutationObserver(() => {
    if (document.querySelector('.lp-sygnet:not(svg)')) {
      window.LampkaLogo && window.LampkaLogo.injectAll();
    }
  });
  obs.observe(document.body, { childList: true, subtree: true });
</script>
</body>
</html>
